name: Update Data & Deploy

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 05:00 Amsterdam (03:00 UTC)
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

# Serialize Pages deployments. Overlapping deployments to the github-pages
# environment are the most common cause of "Deployment failed, try again later".
# Do not cancel in-progress runs so the data commit + deploy always finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps
      
      - name: Fetch fill rate data
        env:
          TZ: Europe/Amsterdam
        run: python scripts/fetch_fillrates.py
      
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update container data [skip ci]"
          git pull --rebase || true
          git push
      
      - name: Setup Pages
        uses: actions/configure-pages@v6
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

  # Deploy runs as its own job bound to the github-pages environment, matching
  # GitHub's recommended Pages pattern for reliable deployments.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
