<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assen Afvalmonitor - Ondergrondse Containers</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-body: #0f1419;
            --bg-surface: #16202a;
            --bg-card: #1d2a35;
            --border: #2f3336;
            --text-primary: #e7e9ea;
            --text-secondary: #71767b;
            --text-strong: #fff;
            --accent: #1d9bf0;
            --accent-hover: #1a8cd8;
            --fill-track: #2f3336;
            --marker-stroke: #fff;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-body: #f7f9fa;
                --bg-surface: #ffffff;
                --bg-card: #f0f3f5;
                --border: #dce0e3;
                --text-primary: #1a1a1a;
                --text-secondary: #5b6570;
                --text-strong: #000;
                --accent: #0969da;
                --accent-hover: #0550ae;
                --fill-track: #dce0e3;
                --marker-stroke: #333;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-body); color: var(--text-primary); }
        
        .header { 
            padding: 1rem 1.5rem; 
            background: var(--bg-surface); 
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 1rem;
        }
        .header h1 { font-size: 1.25rem; font-weight: 600; }
        .header .subtitle { color: var(--text-secondary); font-size: 0.85rem; }
        
        .layout { display: flex; height: calc(100vh - 60px); }
        
        .sidebar {
            width: 320px; min-width: 320px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1rem;
        }
        
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 0.75rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
        }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--text-strong); }
        .stat-card .label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
        
        .legend { margin-bottom: 1.5rem; }
        .legend h3 { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .legend-item {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.4rem 0; cursor: pointer;
            transition: opacity 0.2s;
        }
        .legend-item:hover { opacity: 0.8; }
        .legend-item.inactive { opacity: 0.3; }
        .legend-dot {
            width: 12px; height: 12px; border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-label { font-size: 0.85rem; flex: 1; }
        .legend-count { font-size: 0.8rem; color: var(--text-secondary); }
        
        .filter-section { margin-bottom: 1.5rem; }
        .filter-section h3 { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .search-input {
            width: 100%; padding: 0.5rem 0.75rem;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-primary);
            font-size: 0.85rem; outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-secondary); }
        
        .info-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            display: none;
        }
        .info-panel.active { display: block; }
        .info-panel h3 { font-size: 0.95rem; margin-bottom: 0.5rem; }
        .info-row { display: flex; justify-content: space-between; padding: 0.3rem 0; font-size: 0.85rem; }
        .info-row .label { color: var(--text-secondary); }
        
        .fill-indicator {
            height: 6px; background: var(--fill-track); border-radius: 3px;
            margin-top: 0.5rem; overflow: hidden;
        }
        .fill-indicator .bar {
            height: 100%; border-radius: 3px;
            transition: width 0.3s;
        }
        
        #map { flex: 1; }
        
        .refresh-btn {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            background: var(--accent); color: #fff;
            border: none; border-radius: 8px;
            padding: 0.75rem 1.25rem; font-size: 0.85rem;
            cursor: pointer; font-weight: 600;
            box-shadow: 0 4px 12px rgba(29,155,240,0.3);
            z-index: 1000;
        }
        .refresh-btn:hover { background: var(--accent-hover); }
        
        .status-badge {
            display: inline-block; padding: 0.2rem 0.5rem;
            border-radius: 4px; font-size: 0.7rem;
            font-weight: 600; text-transform: uppercase;
        }
        .status-badge.live { background: #00ba7c33; color: #00ba7c; }
        .status-badge.static { background: #f9197f33; color: #f9197f; }
        
        @media (max-width: 768px) {
            .layout { flex-direction: column-reverse; }
            .sidebar { width: 100%; min-width: unset; height: 40vh; border-right: none; border-top: 1px solid var(--border); }
            #map { height: 60vh; }
        }

        .changelog { margin-top: 1rem; }
        .changelog h3 { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .changelog-entry {
            padding: 0.5rem 0.6rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            display: flex; align-items: flex-start; gap: 0.5rem;
        }
        .changelog-entry:last-child { border-bottom: none; }
        .changelog-icon { font-size: 1.1rem; flex-shrink: 0; }
        .changelog-body { flex: 1; }
        .changelog-meta { color: var(--text-secondary); font-size: 0.7rem; margin-top: 0.15rem; }
        .changelog-change { font-weight: 600; }
        .changelog-change.drop { color: #4caf50; }
        .changelog-change.rise { color: #ff6b35; }
        .stale-badge { 
            display: inline-block; background: #f44336; color: #fff;
            font-size: 0.6rem; padding: 0.1rem 0.3rem; border-radius: 3px;
            font-weight: 700; margin-left: 0.3rem; vertical-align: middle;
        }
        .filter-btn {
            padding: 0.4rem 0.75rem; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-secondary);
            border-radius: 6px; font-size: 0.8rem; cursor: pointer;
            font-weight: 500; transition: all 0.15s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .history-panel {
            margin-top: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
        }
        .history-panel h3 { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .history-panel canvas { width: 100% !important; height: 180px !important; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗑️ Assen Afvalmonitor</h1>
        <span class="subtitle">Ondergrondse containers</span>
        <span class="status-badge static">Static Data</span>
    </div>
    
    <div class="layout">
        <div class="sidebar">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="value" id="total-count">-</div>
                    <div class="label">Containers</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="type-count">-</div>
                    <div class="label">Fracties</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="street-count">-</div>
                    <div class="label">Met vulgraad</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="visible-count">-</div>
                    <div class="label">Zichtbaar</div>
                </div>
            </div>
            
            <div class="filter-section">
                <h3>Zoeken</h3>
                <input type="text" class="search-input" id="search" placeholder="Zoek op straat of nummer...">
            </div>
            
            <div class="filter-section">
                <h3>Minimum vulgraad</h3>
                <div style="display:flex; align-items:center; gap:0.75rem;">
                    <input type="range" id="fill-filter" min="0" max="100" value="0" style="flex:1; accent-color:var(--accent); height:28px;">
                    <span id="fill-filter-label" style="min-width:3ch; font-weight:600;">0%</span>
                </div>
            </div>

            <div class="filter-section">
                <h3>Sensor</h3>
                <div style="display:flex; gap:0.5rem;">
                    <button class="filter-btn active" id="sensor-all" onclick="setSensorFilter('all')">Alle</button>
                    <button class="filter-btn" id="sensor-yes" onclick="setSensorFilter('yes')">Met sensor</button>
                    <button class="filter-btn" id="sensor-no" onclick="setSensorFilter('no')">Zonder sensor</button>
                </div>
            </div>
            
            <div class="legend" id="legend">
                <h3>Fracties</h3>
            </div>
            
            <div class="info-panel" id="info-panel">
                <h3 id="info-title">Container</h3>
                <div id="info-content"></div>
            </div>

            <div class="history-panel" id="history-panel">
                <h3>Vulgraad historie (30 dagen)</h3>
                <canvas id="history-chart"></canvas>
            </div>

            <div class="changelog" id="changelog">
                <h3>Recente wijzigingen</h3>
                <div id="changelog-list"></div>
            </div>
        </div>
        
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        const TYPE_COLORS = {
            'Restafval': '#ff6b35',
            'GFT': '#4caf50',
            'Papier': '#2196f3',
            'Glas': '#9c27b0',
            'PMD': '#ff9800',
            'Onbekend': '#666',
        };
        
        let containers = [];
        let markers = [];
        let activeTypes = new Set();
        let sensorFilter = 'all'; // 'all', 'yes', 'no'
        let map;
        let markerGroup;
        
        // Detect color scheme preference
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const tileUrl = isDark
            ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
            : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        
        // Initialize map centered on Assen
        map = L.map('map', { zoomControl: true }).setView([52.9925, 6.5625], 14);
        const tileLayer = L.tileLayer(tileUrl, {
            attribution: '© OpenStreetMap contributors © CARTO',
            maxZoom: 19
        }).addTo(map);
        
        // Switch tiles when system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            const newUrl = e.matches
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
            tileLayer.setUrl(newUrl);
            updateMarkers(); // refresh marker stroke colors
        });
        
        markerGroup = L.layerGroup().addTo(map);
        
        function createMarker(container) {
            const color = TYPE_COLORS[container.type] || TYPE_COLORS['Onbekend'];
            const fillLevel = container.fillLevel;
            
            let radius = 12;
            let fillOpacity = 0.8;
            let tooltipExtra = '';
            
            if (fillLevel !== undefined && fillLevel !== null) {
                radius = 10 + (fillLevel / 100) * 10;
                fillOpacity = 0.4 + (fillLevel / 100) * 0.5;
                tooltipExtra = `<br>Vulgraad: <strong>${fillLevel}%</strong>`;
            }
            
            const markerStroke = window.matchMedia('(prefers-color-scheme: dark)').matches ? '#fff' : '#333';
            const marker = L.circleMarker([container.lat, container.lng], {
                radius: radius,
                fillColor: color,
                color: markerStroke,
                weight: 1,
                opacity: 0.8,
                fillOpacity: fillOpacity,
            });
            
            marker.bindTooltip(
                `<strong>${container.type || 'Onbekend'}</strong><br>${container.street || container.adres || ''} #${container.number}${tooltipExtra}`,
                { direction: 'top', offset: [0, -8] }
            );
            
            marker.on('click', () => showInfo(container));
            marker.containerData = container;
            return marker;
        }
        
        function showInfo(container) {
            const panel = document.getElementById('info-panel');
            const title = document.getElementById('info-title');
            const content = document.getElementById('info-content');
            
            panel.classList.add('active');
            title.textContent = `Container #${container.number}`;
            
            let html = `
                <div class="info-row"><span class="label">Adres</span><span>${container.street || container.adres || '-'}</span></div>
                <div class="info-row"><span class="label">Fractie</span><span>${container.type || '-'}</span></div>
                <div class="info-row"><span class="label">Sensor</span><span>${container.heeftSensor ? 'Ja' : 'Nee'}</span></div>
            `;
            
            if (container.fillLevel !== undefined && container.fillLevel !== null) {
                const level = container.fillLevel;
                const barColor = level > 80 ? '#f44336' : level > 50 ? '#ff9800' : '#4caf50';
                html += `
                    <div class="info-row"><span class="label">Vulgraad</span><span><strong>${level}%</strong></span></div>
                    <div class="fill-indicator"><div class="bar" style="width:${level}%;background:${barColor}"></div></div>
                `;
            }
            
            content.innerHTML = html;
            
            // Update chart to show this container's history
            if (historyData) {
                renderContainerHistory(container.number);
            }
        }
        
        function updateMarkers() {
            markerGroup.clearLayers();
            markers = [];
            const search = document.getElementById('search').value.toLowerCase();
            const minFill = parseInt(document.getElementById('fill-filter').value) || 0;
            let visible = 0;
            
            containers.forEach(container => {
                if (!activeTypes.has(container.type || 'Onbekend')) return;
                if (search && !(`${container.street || container.adres || ''} ${container.number}`.toLowerCase().includes(search))) return;
                if (minFill > 0 && (container.fillLevel === undefined || container.fillLevel === null || container.fillLevel < minFill)) return;
                if (sensorFilter === 'yes' && !container.heeftSensor) return;
                if (sensorFilter === 'no' && container.heeftSensor) return;
                
                const marker = createMarker(container);
                markerGroup.addLayer(marker);
                markers.push(marker);
                visible++;
            });
            
            document.getElementById('visible-count').textContent = visible;
        }
        
        function buildLegend() {
            const legend = document.getElementById('legend');
            const typeCounts = {};
            containers.forEach(c => {
                const t = c.type || 'Onbekend';
                typeCounts[t] = (typeCounts[t] || 0) + 1;
            });
            
            let html = '<h3>Fracties</h3>';
            Object.entries(typeCounts)
                .sort((a, b) => b[1] - a[1])
                .forEach(([type, count]) => {
                    activeTypes.add(type);
                    const color = TYPE_COLORS[type] || '#666';
                    html += `
                        <div class="legend-item" data-type="${type}" onclick="toggleType('${type}')">
                            <div class="legend-dot" style="background:${color}"></div>
                            <span class="legend-label">${type}</span>
                            <span class="legend-count">${count}</span>
                        </div>
                    `;
                });
            legend.innerHTML = html;
        }
        
        function toggleType(type) {
            const item = document.querySelector(`.legend-item[data-type="${type}"]`);
            if (activeTypes.has(type)) {
                activeTypes.delete(type);
                item.classList.add('inactive');
            } else {
                activeTypes.add(type);
                item.classList.remove('inactive');
            }
            updateMarkers();
        }
        
        function updateStats() {
            document.getElementById('total-count').textContent = containers.length;
            const types = new Set(containers.map(c => c.type).filter(Boolean));
            document.getElementById('type-count').textContent = types.size;
            const withFill = containers.filter(c => c.fillLevel > 0).length;
            document.getElementById('street-count').textContent = withFill;
        }
        
        // Load container data
        async function init() {
            try {
                // Load live fill rate data
                const resp = await fetch('data/containers_fillrates.json');
                const raw = await resp.json();
                containers = raw.map(c => ({
                    number: c.nr,
                    street: c.adres,
                    adres: c.adres,
                    type: c.fractie,
                    lat: parseFloat(c.lat),
                    lng: parseFloat(c.lng),
                    fillLevel: c.vulgraad,
                    heeftSensor: c.heeftSensor,
                    fractieKleur: c.fractieKleur,
                }));
            } catch {
                // Fallback: static ArcGIS data
                try {
                    const resp = await fetch('data/containers.json');
                    containers = await resp.json();
                } catch {
                    const url = 'https://services1.arcgis.com/p5QhXC0i0sZjprM1/arcgis/rest/services/kaart_Ondergrondse_containers_Assen_weergave_NV/FeatureServer/0/query?where=1%3D1&outFields=*&outSR=4326&returnGeometry=true&resultRecordCount=1000&f=json';
                    const resp = await fetch(url);
                    const data = await resp.json();
                    containers = data.features.map(f => ({
                        id: f.attributes.OBJECTID,
                        number: f.attributes.Nummer_,
                        street: f.attributes.Straat,
                        type: f.attributes.Type__,
                        lat: f.geometry.y,
                        lng: f.geometry.x,
                    }));
                }
            }
            
            updateStats();
            buildLegend();
            updateMarkers();
            
            // Load history: try real data first, fall back to mock
            try {
                let histData;
                try {
                    const realResp = await fetch('data/history.json');
                    if (realResp.ok) {
                        histData = await realResp.json();
                        if (histData.history.length < 42) throw new Error('not enough data');
                    } else throw new Error('no real history');
                } catch {
                    const mockResp = await fetch('data/history_mock.json');
                    histData = await mockResp.json();
                }
                renderHistoryChart(histData);
            } catch {}
            
            // Load real events (from CI), fall back to deriving from history
            try {
                const evResp = await fetch('data/events.ndjson');
                const evText = await evResp.text();
                if (evText.trim()) {
                    const events = evText.trim().split('\n').map(l => JSON.parse(l));
                    events.sort((a, b) => b.ts.localeCompare(a.ts));
                    renderChangelog(events.slice(0, 50));
                } else {
                    renderChangelogFromHistory();
                }
            } catch {
                renderChangelogFromHistory();
            }
        }
        
        function renderChangelogFromHistory() {
            if (!historyData) return;
            const events = deriveChanges(historyData);
            renderChangelog(events);
        }
        
        function deriveChanges(histData) {
            const events = [];
            const history = histData.history;
            
            // Compare consecutive snapshots, collect all changes
            for (let i = 1; i < history.length; i++) {
                const prev = history[i - 1].containers;
                const curr = history[i].containers;
                const ts = history[i].ts;
                
                for (const nr of Object.keys(curr)) {
                    if (prev[nr] === undefined) continue;
                    const diff = Math.round((curr[nr] - prev[nr]) * 10) / 10;
                    // Only log significant changes (>5% difference)
                    if (Math.abs(diff) >= 5) {
                        const container = containers.find(c => c.number === nr);
                        events.push({
                            ts,
                            nr,
                            adres: container ? container.adres : '',
                            fractie: container ? container.type : '',
                            from: Math.round(prev[nr]),
                            to: Math.round(curr[nr])
                        });
                    }
                }
            }
            
            // Sort newest first, limit to 50
            events.sort((a, b) => b.ts.localeCompare(a.ts));
            return events.slice(0, 50);
        }
        
        function renderChangelog(events) {
            const list = document.getElementById('changelog-list');
            const now = new Date();
            const STALE_MS = 7 * 24 * 60 * 60 * 1000; // 7 days
            
            let html = '';
            const shown = events.slice(0, 30);
            
            for (const ev of shown) {
                const date = new Date(ev.ts);
                const diff = ev.to - ev.from;
                const isDrop = diff < -20;
                const isRise = diff > 0;
                const icon = isDrop ? '😊' : (isRise ? '📈' : '➡️');
                const cls = isDrop ? 'drop' : (isRise ? 'rise' : '');
                const sign = diff > 0 ? '+' : '';
                
                // Stale detection
                const age = now - date;
                const staleTag = age > STALE_MS ? '<span class="stale-badge">STALE &gt;7d</span>' : '';
                
                const timeStr = date.toLocaleString('nl-NL', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
                
                html += `
                    <div class="changelog-entry">
                        <span class="changelog-icon">${icon}</span>
                        <div class="changelog-body">
                            <div><strong>${ev.nr}</strong> — ${ev.adres || ''} ${staleTag}</div>
                            <div><span class="changelog-change ${cls}">${ev.from}% → ${ev.to}% (${sign}${diff}%)</span> · ${ev.fractie}</div>
                            <div class="changelog-meta">${timeStr}</div>
                        </div>
                    </div>
                `;
            }
            
            list.innerHTML = html || '<div style="color:var(--text-secondary);padding:0.5rem;">Geen wijzigingen</div>';
        }
        
        let historyChart = null;
        let historyData = null; // loaded once, used per-container
        
        function renderHistoryChart(data, containerNr) {
            historyData = data;
            if (containerNr) {
                renderContainerHistory(containerNr);
            } else {
                // Default: show all samples
                renderMultiHistory(data);
            }
        }
        
        function renderContainerHistory(nr) {
            if (!historyData) return;
            const ctx = document.getElementById('history-chart').getContext('2d');
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            const textColor = isDark ? '#71767b' : '#5b6570';
            
            // Get history for this specific container
            const points = historyData.history
                .filter(h => h.containers[nr] !== undefined)
                .map(h => ({ ts: h.ts, val: h.containers[nr] }));
            
            if (points.length === 0) {
                // No history for this container - show message
                if (historyChart) historyChart.destroy();
                historyChart = null;
                document.getElementById('history-chart').parentElement.querySelector('h3').textContent = 
                    'Vulgraad historie — #' + nr + ' (geen data)';
                return;
            }
            
            const labels = points.map(p => {
                const d = new Date(p.ts);
                return d.toLocaleString('nl-NL', {day:'numeric', month:'short'});
            });
            
            const container = containers.find(c => c.number === nr);
            const color = TYPE_COLORS[container ? container.type : 'Onbekend'] || '#1d9bf0';
            
            if (historyChart) historyChart.destroy();
            
            const span = points.length > 1 
                ? Math.round((new Date(points[points.length-1].ts) - new Date(points[0].ts)) / 86400000) 
                : 0;
            document.getElementById('history-chart').parentElement.querySelector('h3').textContent = 
                'Vulgraad historie — #' + nr + (span > 0 ? ' (afgelopen ' + span + ' dagen)' : '');
            
            historyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: nr,
                        data: points.map(p => p.val),
                        borderColor: color,
                        backgroundColor: color + '33',
                        fill: true,
                        borderWidth: 2,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        tension: 0.3,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => ctx.parsed.y + '%' } }
                    },
                    scales: {
                        x: { display: true, ticks: { color: textColor, maxTicksLimit: 6, font: { size: 9 } }, grid: { color: gridColor } },
                        y: { display: true, min: 0, max: 100, ticks: { color: textColor, callback: v => v + '%' }, grid: { color: gridColor } },
                    }
                }
            });
        }
        
        function renderMultiHistory(data) {
            const ctx = document.getElementById('history-chart').getContext('2d');
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            const textColor = isDark ? '#71767b' : '#5b6570';
            
            const span = data.history.length > 1 
                ? Math.round((new Date(data.history[data.history.length-1].ts) - new Date(data.history[0].ts)) / 86400000) 
                : 0;
            document.getElementById('history-chart').parentElement.querySelector('h3').textContent = 
                'Vulgraad historie (' + (span > 0 ? 'afgelopen ' + span + ' dagen' : 'alle data') + ')';
            
            const labels = data.history.map(h => {
                const d = new Date(h.ts);
                return d.toLocaleString('nl-NL', {day:'numeric', month:'short'});
            });
            
            const chartColors = ['#ff6b35','#4caf50','#2196f3','#9c27b0','#ff9800','#00bcd4','#e91e63','#8bc34a'];
            
            const datasets = data.samples.map((sample, i) => ({
                label: sample.nr + ' (' + sample.fractie + ')',
                data: data.history.map(h => h.containers[sample.nr] || null),
                borderColor: chartColors[i % chartColors.length],
                backgroundColor: 'transparent',
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.3,
            }));
            
            if (historyChart) historyChart.destroy();
            
            historyChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: true, position: 'bottom', labels: { color: textColor, boxWidth: 10, font: { size: 10 } } },
                    },
                    scales: {
                        x: { display: true, ticks: { color: textColor, maxTicksLimit: 8, font: { size: 9 } }, grid: { color: gridColor } },
                        y: { display: true, min: 0, max: 100, ticks: { color: textColor, callback: v => v + '%' }, grid: { color: gridColor } },
                    }
                }
            });
        }
        
        document.getElementById('search').addEventListener('input', updateMarkers);
        const fillFilter = document.getElementById('fill-filter');
        fillFilter.addEventListener('input', () => {
            document.getElementById('fill-filter-label').textContent = fillFilter.value + '%';
            updateMarkers();
        });

        function setSensorFilter(mode) {
            sensorFilter = mode;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('sensor-' + mode).classList.add('active');
            updateMarkers();
        }

        init();
    </script>
</body>
</html>
